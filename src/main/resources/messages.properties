# Default (en-US) message bundle for the Gifiti backend.
# Loaded by I18nConfig#messageSource as ResourceBundleMessageSource(basename="messages").
#
# Scaffolding keys (test.*) below are referenced by I18nConfigTest to prove the
# bundle wiring works. They will be removed in Task 11 once real keys exist and
# no test depends on them.
test.greeting=hello
test.only.in.default=fallback-value
test.validation.notblank=this field cannot be blank

# Business exception keys — populated incrementally as the i18n feature lands.
# error.resource.not.found.with.field is consumed by the legacy 3-arg
# ResourceNotFoundException(resourceName, fieldName, fieldValue) constructor
# introduced in Task 4. Resolution path is exercised by GlobalExceptionHandler
# in Task 5; remaining keys land alongside that task.
error.resource.not.found.with.field={0} not found with {1}: ''{2}''

# GlobalExceptionHandler keys — Task 5.
# These replace the previously-hardcoded English strings inside the handler.
# Values match the prior literals verbatim (spec criterion #20: "no copy
# changes during the i18n migration; localization is a delivery mechanism,
# not a content rewrite").
error.resource.already.exists=Resource already exists
error.validation.failed=Validation failed
error.invalid.parameter=Invalid request parameter
error.request.malformed=Malformed request body
error.http.method.not.supported=Method ''{0}'' is not supported for this endpoint
error.http.media.type.not.supported=Content type ''{0}'' is not supported
error.resource.not.found.generic=Resource not found
error.invalid.parameter.named=Invalid value for parameter ''{0}''
error.unexpected=An unexpected error occurred

# Request DTO validation keys — Task 6.
# Refactored from inline @Annotation(message = "...") on the 13 request DTOs
# enumerated in spec criterion #7. English values match the prior inline
# literals byte-for-byte (spec criterion #20). Where the same literal appeared
# on multiple DTOs (e.g., "Email is required" on RegisterRequest, LoginRequest,
# ForgotPasswordRequest), a single validation.shared.* key is reused per the
# plan § Resource Bundle Structure key namespace convention.
#
# Namespace:
#   validation.shared.<rule>      — cross-DTO reuse (≥2 DTOs)
#   validation.<dto>.<field>.<rule> — single-DTO scope
validation.shared.email.notblank=Email is required
validation.shared.email.invalid=Email must be valid
validation.shared.password.notblank=Password is required
validation.shared.password.size=Password must be 12-128 characters
validation.shared.password.pattern=Password must contain uppercase, lowercase, digit, and special character (@$!%*?&._#^()-+=)
validation.shared.displayname.size=Display name must not exceed 50 characters
validation.shared.token.notblank=Token is required
validation.shared.wishlist.title.size=Title must not exceed 100 characters
validation.shared.wishlist.description.size=Description must not exceed 500 characters
validation.shared.item.name.size=Name must not exceed 200 characters
validation.shared.item.description.size=Description must not exceed 1000 characters
validation.shared.item.productlink.safeurl=Product link must be a valid URL (http/https only)
validation.shared.item.imageurl.safeurl=Image URL must be a valid URL (http/https only)
validation.shared.item.price.positive=Price must be positive
validation.shared.item.quantity.positive=Quantity must be positive
validation.register.email.size=Email must not exceed 254 characters
validation.wishlist.title.notblank=Title is required
validation.item.name.notblank=Name is required
validation.googlelogin.idtoken.notblank=ID token is required
validation.refreshtoken.token.notblank=Refresh token is required

# Success-message keys — Task 7.
# Carried by LocalizedMessage values attached to MessageResponse / RegisterResponse
# in services. The LocalizedMessageSerializer resolves them at JSON-write time
# using LocaleContextHolder.getLocale() (set by GifitiLocaleResolver).
# English values match the prior hardcoded service literals byte-for-byte
# (spec criterion #20: "no copy changes during the i18n migration").
#
# Namespace:
#   <feature>.<action>.<outcome>  (e.g. auth.register.success, wishlist.saved.success)
#   auth.password.reset.requested is the anti-enumeration response shared between
#   the found-email and not-found-email branches of forgotPassword (plan § Component 7).
auth.register.success=Registration successful. Please check your email to verify your account.
auth.email.verified.success=Email verified successfully
auth.email.already.verified=Email is already verified
auth.email.verification.sent=Verification email sent
auth.password.reset.requested=If an account exists with this email, a password reset link has been sent.
auth.password.reset.success=Password has been reset successfully
auth.logout.success=Logged out successfully
user.password.set.success=Password set successfully
wishlist.saved.success=Wishlist saved

# Email-template keys — Task 8 (i18n).
# Carried by EmailTemplateRenderer (@Component) which receives the user's
# Language explicitly as a method argument (NEVER reads LocaleContextHolder),
# so emails survive @Async / @Scheduled flows that lose request-thread
# context (plan § Risk #2). English values are lifted byte-for-byte from the
# pre-i18n EmailTemplates.java per spec criterion #20.
#
# F-6 amendment (plan-amendment-f6.md): every runtime argument substituted
# into the rendered HTML output passes through
# org.springframework.web.util.HtmlUtils.htmlEscape() before substitution.
# Bundle template strings themselves are developer-controlled trusted content
# and are NOT re-escaped.
#
# Namespace:
#   email.<type>.subject              — message Subject header
#   email.<type>.<section>            — copy chunks rendered into the HTML chrome
#   email.<type>.fallback.link        — URL-bearing visible-link text ({0})

# --- Verification email (sent on register + resendVerification) ---
email.verification.subject=Welcome to Gifiti - Please confirm your email
email.verification.welcome=Welcome to
email.verification.body=Thanks for signing up. Please confirm your email address to start creating and sharing wishlists with friends and family.
email.verification.cta=Confirm Email Address
email.verification.fallback.notice=Button not working? Copy and paste this link into your browser:
# SECURITY: link target ({0}) is supplied by the server at render time.
# Do NOT replace {0} with a hardcoded URL. The pt-BR value MUST use {0} identically to en-US.
email.verification.fallback.link={0}
email.verification.ignore.notice=If you didn't create a Gifiti account, you can safely ignore this email.
email.verification.footer.copyright=&copy; 2026 Gifiti. All rights reserved.
email.verification.footer.signup=You received this email because you signed up at

# --- Password reset email (sent on forgotPassword for known users) ---
email.password.reset.subject=Reset your Gifiti password
email.password.reset.heading=Reset your password
email.password.reset.body=We received a request to reset your Gifiti password. Click the button below to choose a new one.
email.password.reset.cta=Reset Password
email.password.reset.fallback.notice=Button not working? Copy and paste this link into your browser:
# SECURITY: link target ({0}) is supplied by the server at render time.
# Do NOT replace {0} with a hardcoded URL. The pt-BR value MUST use {0} identically to en-US.
email.password.reset.fallback.link={0}
email.password.reset.ignore.notice=If you didn't request a password reset, you can safely ignore this email. Your password will remain unchanged.
email.password.reset.footer.copyright=&copy; 2026 Gifiti. All rights reserved.
email.password.reset.footer.notice=You received this email because you requested a password reset at
