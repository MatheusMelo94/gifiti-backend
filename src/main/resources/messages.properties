# Default (en-US) message bundle for the Gifiti backend.
# Loaded by I18nConfig#messageSource as ResourceBundleMessageSource(basename="messages").
#
# Scaffolding keys (test.*) below are referenced by I18nConfigTest to prove the
# bundle wiring works. They will be removed in Task 11 once real keys exist and
# no test depends on them.
test.greeting=hello
test.only.in.default=fallback-value
test.validation.notblank=this field cannot be blank

# Business exception keys — populated incrementally as the i18n feature lands.
# error.resource.not.found.with.field is consumed by the legacy 3-arg
# ResourceNotFoundException(resourceName, fieldName, fieldValue) constructor
# introduced in Task 4. Resolution path is exercised by GlobalExceptionHandler
# in Task 5; remaining keys land alongside that task.
error.resource.not.found.with.field={0} not found with {1}: ''{2}''
