spring:
  data:
    mongodb:
      # URI is set dynamically by Testcontainers
      auto-index-creation: true

jwt:
  secret: test-secret-key-for-testing-minimum-32-characters
  expiration: 3600000
  refresh-expiration: 604800000

app:
  resend:
    api-key: test-api-key
  swagger:
    enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: WARN
    com.gifiti.api: DEBUG
