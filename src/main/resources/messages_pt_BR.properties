# --- Auth flows ---
error.auth.account.locked=[TODO pt-BR] Account temporarily locked due to multiple failed attempts. Try again later.

# SECURITY: anti-enumeration — keep equally vague as the en-US version.
# Don't reveal whether the email exists or which credential failed. Don't
# embed the email. Length must stay close to en-US length (Task 11 enforces).
error.auth.credentials.invalid=[TODO pt-BR] Invalid email or password

# SECURITY: anti-enumeration — same discipline as en-US. Refresh-token
# failures uniformly map to a single string regardless of root cause.
error.auth.refresh.token.invalid=[TODO pt-BR] Invalid or expired refresh token
# SECURITY: anti-enumeration — keep equally vague.
error.auth.refresh.token.malformed=[TODO pt-BR] Invalid refresh token

# SECURITY: anti-enumeration — verification-token failures must remain
# uniform across "no such token", "wrong owner", "expired" (where applicable).
# Don't embed user identity in the translated string.
error.auth.verification.token.invalid=[TODO pt-BR] Invalid verification token
# SECURITY: anti-enumeration — token-expired reveals expiry only.
# Must NOT mention which user the token belonged to or embed email.
error.auth.verification.token.expired=[TODO pt-BR] Verification token has expired

error.auth.user.not.found=[TODO pt-BR] User not found

# SECURITY: anti-enumeration — same discipline as verification-token.
error.auth.password.reset.token.invalid=[TODO pt-BR] Invalid password reset token
# SECURITY: anti-enumeration — token-expired reveals expiry status only.
# Must NOT mention which user the token belonged to or embed email.
error.auth.password.reset.token.expired=[TODO pt-BR] Password reset token has expired

