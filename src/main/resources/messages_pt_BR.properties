# Business exception keys — Task 10. Translated in Task 12.
# F-1 SECURITY discipline preserved across all anti-enumeration keys
# (see comments inline below).

# --- Auth flows ---
error.auth.account.locked=Conta temporariamente bloqueada devido a múltiplas tentativas falhas. Tente novamente mais tarde.

# SECURITY: anti-enumeration — keep equally vague as the en-US version.
# Don't reveal whether the email exists or which credential failed. Don't
# embed the email. Length must stay close to en-US length (Task 11 enforces).
error.auth.credentials.invalid=Email ou senha inválidos

# SECURITY: anti-enumeration — same discipline as en-US. Refresh-token
# failures uniformly map to a single string regardless of root cause.
error.auth.refresh.token.invalid=Refresh token inválido ou expirado
# SECURITY: anti-enumeration — keep equally vague.
error.auth.refresh.token.malformed=Refresh token inválido

# SECURITY: anti-enumeration — verification-token failures must remain
# uniform across "no such token", "wrong owner", "expired" (where applicable).
# Don't embed user identity in the translated string.
error.auth.verification.token.invalid=Token de verificação inválido
# SECURITY: anti-enumeration — token-expired reveals expiry only.
# Must NOT mention which user the token belonged to or embed email.
error.auth.verification.token.expired=Token de verificação expirou

error.auth.user.not.found=Usuário não encontrado

# SECURITY: anti-enumeration — same discipline as verification-token.
error.auth.password.reset.token.invalid=Token de senha inválido
# SECURITY: anti-enumeration — token-expired reveals expiry status only.
# Must NOT mention which user the token belonged to or embed email.
error.auth.password.reset.token.expired=Token de redefinição de senha expirou

error.auth.google.credentials.invalid=Credenciais do Google inválidas
error.auth.google.email.not.verified=Email da conta Google não verificado

# --- Email registration / verification gating ---
error.email.already.registered=Email já cadastrado
error.email.verification.required=Verificação de email obrigatória. Verifique seu email antes de realizar esta ação.

# --- Cross-resource access (generic 403) ---
error.access.denied=Acesso negado

# --- Reservation flow ---
error.reservation.fully.reserved=Item totalmente reservado
error.reservation.partially.available=Apenas {0} restante(s) (solicitado: {1})
error.reservation.already.reserved.by.user=Você já reservou este item

# --- Image upload pipeline ---
error.image.upload.context.invalid=Contexto deve ser ''item'' ou ''wishlist''
error.image.upload.read.failed=Falha ao ler o conteúdo do arquivo
error.image.upload.failed=Falha ao enviar imagem. Tente novamente.

# --- Image validation pipeline ---
error.image.validation.required=Arquivo é obrigatório
error.image.validation.empty=Arquivo não pode estar vazio
error.image.validation.too.large=Tamanho do arquivo excede o máximo de 5MB
error.image.validation.type.not.allowed=Tipo de arquivo não permitido. Aceitos: JPEG, PNG, WebP
error.image.validation.content.mismatch=Conteúdo do arquivo não corresponde ao tipo declarado
error.image.validation.mime.unsupported=Tipo MIME não suportado: {0}

