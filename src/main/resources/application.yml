spring:
  application:
    name: gifiti-backend
  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  # Request size limits to prevent DoS attacks
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

jwt:
  # SECURITY: No default value - JWT_SECRET must be set via environment variable
  # Generate with: openssl rand -base64 32
  secret: ${JWT_SECRET}
  expiration: 3600000  # 1 hour in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

server:
  port: ${PORT:8080}
  # M-06 Security hardening: Disable error details and server header
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
  # Request size limits
  tomcat:
    max-http-form-post-size: 1MB
    max-swallow-size: 1MB

# CORS configuration - override for production
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost:5173}

# Actuator configuration (M-01 security hardening)
# Explicitly define which endpoints are exposed
management:
  endpoints:
    web:
      exposure:
        include: health,info  # Only expose health and info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized  # Don't leak internal details publicly
    env:
      enabled: false  # Disable sensitive endpoints
    heapdump:
      enabled: false
    threaddump:
      enabled: false
    beans:
      enabled: false
    mappings:
      enabled: false
  health:
    mongo:
      enabled: true  # Include MongoDB health check

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

app:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
  swagger:
    enabled: ${SWAGGER_ENABLED:false}
  mail:
    from: ${MAIL_FROM:noreply@gifiti.com}
  base-url: ${APP_BASE_URL:http://localhost:5173}
  cookie:
    secure: ${APP_COOKIE_SECURE:true}
    same-site: ${APP_COOKIE_SAME_SITE:Lax}
    domain: ${APP_COOKIE_DOMAIN:}

logging:
  level:
    root: INFO
    com.gifiti.api: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
