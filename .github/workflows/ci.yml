# CI pipeline for gifiti-backend.
# Cite: devops-conventions.md § CI Pipeline Shape
# Runs on every push and on PRs targeting main. Build + tests must pass before
# any deploy workflow is allowed to proceed (deploy-staging.yml depends on this
# via workflow_run).
#
# Scope notes (intentional omissions, documented per § Scope Posture):
#   - No security scanning here yet (routes to Security Engineer).
#   - No Dependabot/Renovate trigger (deferred at MVP posture).
#   - No deploy step (lives in deploy-staging.yml / deploy-prod.yml).
#
# Injection safety: this workflow does not interpolate any github.event.*
# user-controlled fields into run: blocks.

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    # 15 min: integration tests pulled into CI by Task 11 of the i18n feature
    # add ~3-4 minutes of Testcontainers MongoDB startup and end-to-end runs.
    # Headroom for Maven dependency resolution on cold cache plus the new
    # integration suite.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build & test
        # Runs the full unit + integration suite, with the legacy integration
        # tests still excluded by explicit class name. The 4 targeted re-enables
        # (Auth, Profile, Wishlist, WishlistItem) plus the i18n feature suite
        # under com.gifiti.api.integration.i18n.* now run in CI as of Task 11
        # of the i18n feature.
        #
        # Excluded by class name: 9 pre-existing integration tests with fixture
        # drift unrelated to this feature. Each top-level entry is paired with
        # `$*` to also catch nested `@Nested` classes (Surefire treats nested
        # classes as distinct types for filtering). Tracked separately; restore
        # individual entries by removing them from the exclusion list once the
        # targeted fixture refresh lands.
        run: |
          ./mvnw --batch-mode --no-transfer-progress \
            -Dtest='!com.gifiti.api.integration.AccountLockoutIntegrationTest,!com.gifiti.api.integration.GifterIntegrationTest,!com.gifiti.api.integration.GifterIntegrationTest$*,!com.gifiti.api.integration.GifterPrivacyIntegrationTest,!com.gifiti.api.integration.ImageUploadIntegrationTest,!com.gifiti.api.integration.PrivacyIntegrationTest,!com.gifiti.api.integration.PublicWishlistIntegrationTest,!com.gifiti.api.integration.PublicWishlistIntegrationTest$*,!com.gifiti.api.integration.ReservationIntegrationTest,!com.gifiti.api.integration.ReservationIntegrationTest$*,!com.gifiti.api.integration.UserPersistenceTest,!com.gifiti.api.integration.WishlistCoverImageIntegrationTest,!com.gifiti.api.integration.WishlistCoverImageIntegrationTest$*' \
            test

      - name: Upload Surefire reports on failure or cancellation
        # `always()` covers success/failure/cancelled. We want reports on
        # cancellation too because GitHub's `failure()` does not fire when the
        # runner kills the job for timeout — and that's exactly when we most
        # need the partial reports for diagnosis.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7
