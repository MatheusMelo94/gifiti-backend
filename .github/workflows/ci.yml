# CI pipeline for gifiti-backend.
# Cite: devops-conventions.md § CI Pipeline Shape
# Runs on every push and on PRs targeting main. Build + tests must pass before
# any deploy workflow is allowed to proceed (deploy-staging.yml depends on this
# via workflow_run).
#
# Scope notes (intentional omissions, documented per § Scope Posture):
#   - No security scanning here yet (routes to Security Engineer).
#   - No Dependabot/Renovate trigger (deferred at MVP posture).
#   - No deploy step (lives in deploy-staging.yml / deploy-prod.yml).
#
# Injection safety: this workflow does not interpolate any github.event.*
# user-controlled fields into run: blocks.

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    # 35 min: integration suite takes ~25-30 min on ubuntu-latest. Each
    # @SpringBootTest restarts the Spring context, which dominates wall time.
    # Local M-series finishes in ~20 min; CI runner is ~1.5x slower for JVM
    # workloads. Re-evaluate if/when the suite grows or context-caching lands.
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build & test (./mvnw verify)
        # `verify` covers unit + integration tests. Testcontainers requires
        # Docker, which is preinstalled on ubuntu-latest GitHub runners.
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Upload Surefire reports on failure or cancellation
        # `always()` covers success/failure/cancelled. We want reports on
        # cancellation too because GitHub's `failure()` does not fire when the
        # runner kills the job for timeout — and that's exactly when we most
        # need the partial reports for diagnosis.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          if-no-files-found: ignore
          retention-days: 7
